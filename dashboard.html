<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BusinessOS v1.3</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app-layout">

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">B</div>
      <div>
        <div class="sidebar-brand">BusinessOS</div>
        <div class="sidebar-company" id="sidebarCompany">—</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Dynamically generated -->
    </nav>

    <div class="sidebar-footer">
      <button class="sidebar-toggle" id="sidebarToggle" title="Recolher sidebar">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <div class="main-content" id="mainContent">

    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 4h14M2 9h14M2 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="topbar-breadcrumb">
          <span id="topbarModule">Dashboard</span>
        </div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-ghost btn-sm btn-icon" id="logoutBtn" title="Sair">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 14H3a1 1 0 01-1-1V3a1 1 0 011-1h3M11 11l3-3-3-3M14 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="topbar-user">
          <span class="topbar-user-name" id="topbarUserName">—</span>
          <span class="topbar-user-role">Administrador</span>
        </div>
        <div class="topbar-avatar" id="topbarAvatar">?</div>
      </div>
    </header>

    <!-- Page content (swapped by JS) -->
    <main class="page-body" id="pageContent"></main>
  </div>
</div>

<!-- ── Modals ────────────────────────────────────────────── -->

<!-- Add Product -->
<div class="modal-overlay" id="modalProduct">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="productModalTitle">Novo Produto</h3>
      <button class="modal-close" data-close="modalProduct">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <input type="hidden" id="productId"/>
    <div class="form-group">
      <label>Nome do produto *</label>
      <input type="text" id="productName" class="input" placeholder="Ex: Filtro de óleo Bosch"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Categoria</label>
        <input type="text" id="productCategory" class="input" placeholder="Ex: Filtros"/>
      </div>
      <div class="form-group">
        <label>Preço (R$) *</label>
        <input type="number" id="productPrice" class="input" placeholder="0,00" min="0" step="0.01"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantidade em estoque *</label>
        <input type="number" id="productQty" class="input" placeholder="0" min="0"/>
      </div>
      <div class="form-group">
        <label>Estoque mínimo</label>
        <input type="number" id="productMinStock" class="input" placeholder="5" min="0"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="modalProduct">Cancelar</button>
      <button class="btn btn-primary" id="saveProductBtn">Salvar produto</button>
    </div>
  </div>
</div>

<!-- Add Customer -->
<div class="modal-overlay" id="modalCustomer">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Novo Cliente</h3>
      <button class="modal-close" data-close="modalCustomer">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>Nome *</label>
      <input type="text" id="customerName" class="input" placeholder="Nome completo"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Telefone</label>
        <input type="tel" id="customerPhone" class="input" placeholder="(11) 99999-9999"/>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="customerEmail" class="input" placeholder="email@exemplo.com"/>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="modalCustomer">Cancelar</button>
      <button class="btn btn-primary" id="saveCustomerBtn">Salvar cliente</button>
    </div>
  </div>
</div>

<!-- New Sale -->
<div class="modal-overlay" id="modalSale">
  <div class="modal" style="max-width:520px;">
    <div class="modal-header">
      <h3 class="modal-title">Nova Venda</h3>
      <button class="modal-close" data-close="modalSale">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>Produto *</label>
      <select id="saleProduct" class="input">
        <option value="">Selecione um produto…</option>
      </select>
    </div>
    <div id="saleProductInfo" style="display:none;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:16px;font-size:0.8125rem;">
      Preço: <strong id="salePriceDisplay">—</strong> · Estoque: <strong id="saleStockDisplay">—</strong>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantidade *</label>
        <input type="number" id="saleQty" class="input" placeholder="1" min="1"/>
      </div>
      <div class="form-group">
        <label>Forma de Pagamento</label>
        <select id="salePayment" class="input">
          <option value="dinheiro">Dinheiro</option>
          <option value="pix">Pix</option>
          <option value="cartao">Cartão</option>
          <option value="fiado">Fiado</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Cliente (opcional)</label>
      <select id="saleCustomer" class="input">
        <option value="">Balcão (sem vínculo)</option>
      </select>
    </div>
    <div id="saleTotalBox" style="display:none;padding:12px;background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.15);border-radius:6px;margin-bottom:4px;">
      <div style="font-size:0.75rem;color:var(--text-2);margin-bottom:2px;">Total da venda</div>
      <div id="saleTotalDisplay" style="font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;color:var(--accent)">R$ 0,00</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="modalSale">Cancelar</button>
      <button class="btn btn-primary" id="saveSaleBtn">Registrar venda</button>
    </div>
  </div>
</div>

<!-- Add Expense -->
<div class="modal-overlay" id="modalExpense">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">Nova Despesa</h3>
      <button class="modal-close" data-close="modalExpense">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>Descrição *</label>
      <input type="text" id="expenseDesc" class="input" placeholder="Ex: Aluguel, energia…"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Valor (R$) *</label>
        <input type="number" id="expenseAmount" class="input" placeholder="0,00" min="0" step="0.01"/>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="expenseCategory" class="input">
          <option>Fixo</option>
          <option>Variável</option>
          <option>Utilidades</option>
          <option>Estoque</option>
          <option>Pessoal</option>
          <option>Outro</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="modalExpense">Cancelar</button>
      <button class="btn btn-primary" id="saveExpenseBtn">Salvar despesa</button>
    </div>
  </div>
</div>

<!-- ── V1.2: Supplier Modal ──────────────────────────────── -->
<div class="modal-overlay" id="modalSupplier">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <h3 class="modal-title" id="supplierModalTitle">Novo Fornecedor</h3>
      <button class="modal-close" data-close="modalSupplier">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <input type="hidden" id="supplierId"/>
    <div class="form-group">
      <label>Nome da empresa *</label>
      <input type="text" id="supplierName" class="input" placeholder="Ex: Bosch do Brasil"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Contato</label>
        <input type="text" id="supplierContact" class="input" placeholder="Nome do responsável"/>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <input type="text" id="supplierCategory" class="input" placeholder="Ex: Filtros, Motor…"/>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Telefone</label>
        <input type="tel" id="supplierPhone" class="input" placeholder="(11) 99999-9999"/>
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="supplierEmail" class="input" placeholder="contato@empresa.com"/>
      </div>
    </div>
    <div class="form-group">
      <label>CNPJ</label>
      <input type="text" id="supplierCnpj" class="input" placeholder="00.000.000/0001-00"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="modalSupplier">Cancelar</button>
      <button class="btn btn-primary" id="saveSupplierBtn">Salvar fornecedor</button>
    </div>
  </div>
</div>

<!-- ── V1.2: Purchase Modal ──────────────────────────────── -->
<div class="modal-overlay" id="modalPurchase">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <h3 class="modal-title">Registrar Compra</h3>
      <button class="modal-close" data-close="modalPurchase">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="form-group">
      <label>Produto *</label>
      <select id="purchaseProduct" class="input">
        <option value="">Selecione o produto…</option>
      </select>
    </div>
    <div class="form-group">
      <label>Fornecedor</label>
      <select id="purchaseSupplier" class="input">
        <option value="">Fornecedor avulso</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Quantidade *</label>
        <input type="number" id="purchaseQty" class="input" placeholder="0" min="1"/>
      </div>
      <div class="form-group">
        <label>Custo unitário (R$) *</label>
        <input type="number" id="purchaseUnitCost" class="input" placeholder="0,00" min="0" step="0.01"/>
      </div>
    </div>
    <div id="purchaseTotalBox" style="display:none;padding:12px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.15);border-radius:var(--radius-sm);margin-bottom:4px;">
      <div style="font-size:0.75rem;color:var(--text-2);margin-bottom:2px">Total da compra (despesa)</div>
      <div id="purchaseTotalCost" style="font-size:1.5rem;font-weight:700;letter-spacing:-0.02em;color:var(--red)">R$ 0,00</div>
    </div>
    <div class="form-group" style="margin-top:8px;">
      <label>Observações</label>
      <input type="text" id="purchaseNotes" class="input" placeholder="Opcional…"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-close="modalPurchase">Cancelar</button>
      <button class="btn btn-primary" id="savePurchaseBtn">Registrar compra</button>
    </div>
  </div>
</div>

<!-- ── Modal Confirmação (substitui window.confirm — funciona em mobile) ── -->
<div class="modal-overlay" id="modalConfirm">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h3 class="modal-title" id="confirmModalTitle">Confirmar ação</h3>
    </div>
    <p id="confirmModalMessage" style="font-size:0.875rem;color:var(--text-2);line-height:1.6;margin-bottom:4px;"></p>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="confirmModalCancel">Cancelar</button>
      <button class="btn btn-danger" id="confirmModalOk">Confirmar</button>
    </div>
  </div>
</div>

<script src="js/env-init.js"></script>
<script type="module">
import StorageService from './js/core/storage.js';
import EventBus from './js/core/eventBus.js';
import AppState from './js/core/appState.js';
import AuthService from './js/services/auth.js';
import NotificationService from './js/core/notifications.js';
import ProductsModule from './js/modules/products.js';
import SalesModule from './js/modules/sales.js';
import CustomersModule from './js/modules/customers.js';
import FinanceModule from './js/modules/finance.js';
import SettingsModule from './js/modules/settings.js';
import ExportService from './js/services/export.js';
import DashboardService from './js/services/dashboardService.js';
import StatisticsService from './js/services/statisticsService.js';
import Logger from './js/services/logger.js';
import OnboardingService from './js/services/onboardingService.js';
import SettingsService from './js/services/settingsService.js';
import Timeline from './js/components/timeline.js';
// ── V1.2 ──
import PurchasesModule from './js/modules/purchases.js';
import InsightsEngine from './js/core/InsightsEngine.js';
import DataCore from './js/core/DataCore.js';
// ── V1.3 ──
import AIService from './js/services/ai.js';

// Hydrate global app state on every page load.
AppState.hydrate();

// Apply theme to document
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
}
applyTheme(AppState.get('theme'));

// Listen for theme changes
EventBus.subscribe('APPSTATE_CHANGED', (data) => {
  if (data.patch && data.patch.theme) {
    applyTheme(data.patch.theme);
  }
});

const { EVENTS } = EventBus;

// ── Listener cleanup registry ────────────────────────────
// Tracks active subscriptions so they can be torn down before re-subscribing
const _unsubs = [];
function _clearListeners() {
  while (_unsubs.length) _unsubs.pop()();
}
function _sub(event, fn) {
  _unsubs.push(EventBus.subscribe(event, fn));
}

// ── Auth guard ────────────────────────────────────────────
const session = AuthService.requireAuth();
if (!session) throw new Error('Not authenticated');

document.getElementById('topbarUserName').textContent = session.name;
document.getElementById('topbarAvatar').textContent = session.name[0].toUpperCase();
document.getElementById('sidebarCompany').textContent = session.company || 'Minha Empresa';
document.getElementById('logoutBtn').addEventListener('click', () => AuthService.logout());

// ── Sidebar & routing ─────────────────────────────────────
const ALL_MODULES = [
  { id: 'dashboard', label: 'Dashboard', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>`, always: true },
  { id: 'products', label: 'Produtos', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 4l6-2 6 2v8l-6 2-6-2V4z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M8 2v12M2 4l6 2 6-2" stroke="currentColor" stroke-width="1.5"/></svg>` },
  { id: 'customers', label: 'Clientes', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6" cy="5" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M1 14c0-2.76 2.24-5 5-5s5 2.24 5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M12 7c1.1 0 2 .9 2 2s-.9 2-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M14 14c0-1.65-.67-3-2-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>` },
  { id: 'sales', label: 'Vendas', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M1 1h2l2 8h8l2-6H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="7" cy="13" r="1" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="13" r="1" stroke="currentColor" stroke-width="1.5"/></svg>` },
  { id: 'purchases', label: 'Compras', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2h2l1.5 7h7l1.5-5H5.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 10v4M6 14h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`, v12: true },
  { id: 'finance', label: 'Financeiro', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M11 4H6.5a2.5 2.5 0 000 5h3a2.5 2.5 0 010 5H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>` },
  { id: 'insights', label: 'Insights', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1a5 5 0 015 5c0 2-1.2 3.7-3 4.6V12H6v-1.4C4.2 9.7 3 8 3 6a5 5 0 015-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M6 14h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`, v12: true },
  { id: 'reports', label: 'Relatórios', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 12V8M7 12V5M11 12V9M15 12V6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>` },
  { id: 'ai', label: 'Assistente IA', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6" stroke="currentColor" stroke-width="1.5"/><path d="M5 8c0-1.66 1.34-3 3-3s3 1.34 3 3-1.34 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="8" r="1" fill="currentColor"/></svg>`, v13: true },
  { id: 'settings', label: 'Configurações', icon: `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M15 8h-2M3 8H1M13 3l-1.4 1.4M4.4 11.6L3 13M13 13l-1.4-1.4M4.4 4.4L3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>` },
];

// Seed v1.2 data after boot
setTimeout(() => { try { DataCore.seedV12DemoData(); } catch(e) {} }, 500);

let activeModule = 'dashboard';
let sidebarCollapsed = false;

// Bug #8: Track Chart.js instances so they can be destroyed before re-render
const _charts = {};
function _destroyChart(id) {
  if (_charts[id]) { _charts[id].destroy(); delete _charts[id]; }
}
function _createChart(id, config) {
  _destroyChart(id);
  const ctx = document.getElementById(id)?.getContext('2d');
  if (!ctx) return;
  _charts[id] = new Chart(ctx, config);
}

function buildSidebar() {
  const activeModuleIds = StorageService.getActiveModules();
  const nav = document.getElementById('sidebarNav');
  const lowStockCount = ProductsModule.getLowStock().length;
  // V1.2: count high-priority alerts for insights badge
  let insightAlerts = 0;
  try { insightAlerts = InsightsEngine.getAlerts().filter(i => i.type === 'danger').length; } catch(e) {}
  nav.innerHTML = '';

  const section = document.createElement('div');
  section.className = 'sidebar-section';

  ALL_MODULES.forEach(mod => {
    if (!mod.always && !activeModuleIds.includes(mod.id) && !mod.v12 && !mod.v13) return;
    const btn = document.createElement('button');
    btn.className = `sidebar-item${activeModule === mod.id ? ' active' : ''}`;
    btn.dataset.module = mod.id;
    let badge = '';
    if (mod.id === 'products' && lowStockCount > 0) {
      badge = `<span class="sidebar-badge">${lowStockCount}</span>`;
    }
    if (mod.id === 'insights' && insightAlerts > 0) {
      badge = `<span class="sidebar-badge">${insightAlerts}</span>`;
    }
    btn.innerHTML = `${mod.icon}<span class="sidebar-item-label">${mod.label}</span>${badge}`;
    btn.addEventListener('click', () => navigateTo(mod.id));
    section.appendChild(btn);
  });

  nav.appendChild(section);
}

function navigateTo(moduleId) {
  // ── Session-based notification guard (once per module per session) ──
  if (!window.__bosNotified) window.__bosNotified = new Set();
  const _isFirstVisit = !window.__bosNotified.has(moduleId);
  window.__bosNotified.add(moduleId);

  // Tear down any module-level listeners from previous view
  _clearListeners();
  activeModule = moduleId;
  document.getElementById('topbarModule').textContent = ALL_MODULES.find(m => m.id === moduleId)?.label || moduleId;
  buildSidebar();

  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
  }

  const renderers = {
    dashboard: renderDashboard,
    products: renderProducts,
    customers: renderCustomers,
    sales: renderSales,
    finance: renderFinance,
    reports: renderReports,
    settings: () => SettingsModule.render(document.getElementById('pageContent')),
    // ── V1.2 ──
    purchases: renderPurchases,
    insights: renderInsights,
    // ── V1.3 ──
    ai: renderAI,
  };

  EventBus.publish(EVENTS.MODULE_CHANGED, { module: moduleId });
  AppState.touch();
  (renderers[moduleId] || renderDashboard)();

  // ── Instruction notifications: show only on first visit per session ──
  if (_isFirstVisit) {
    OnboardingService.showFor(moduleId);
    const msgs = {
      dashboard: 'Visão geral do seu negócio',
      products:   'Gerencie produtos e estoque',
      customers:  'Acompanhe seus clientes',
      sales:      'Registre novas vendas',
      finance:    'Acompanhe suas finanças',
      reports:    'Relatórios e análises',
      purchases:  'Compras e fornecedores',
      insights:   'Análises inteligentes',
      ai:         'Tire dúvidas com IA',
      settings:   'Configure sua conta',
    };
    if (msgs[moduleId]) NotificationService.info(msgs[moduleId], 3000);
  }
}

/**
 * showConfirm — substitui window.confirm() que falha silenciosamente em mobile.
 *
 * @param {string}   message     Texto da pergunta para o usuário.
 * @param {Function} onConfirm   Callback executado se o usuário confirmar.
 * @param {object}   [opts]
 * @param {string}   [opts.title='Confirmar ação']
 * @param {string}   [opts.confirmLabel='Confirmar']
 * @param {boolean}  [opts.danger=true]
 */
function showConfirm(message, onConfirm, opts = {}) {
  const {
    title        = 'Confirmar ação',
    confirmLabel = 'Confirmar',
    danger       = true,
  } = opts;

  document.getElementById('confirmModalTitle').textContent   = title;
  document.getElementById('confirmModalMessage').textContent = message;

  const okBtn     = document.getElementById('confirmModalOk');
  const cancelBtn = document.getElementById('confirmModalCancel');

  // Clone to remove any previously attached one-shot listeners
  const newOk     = okBtn.cloneNode(true);
  const newCancel = cancelBtn.cloneNode(true);
  okBtn.parentNode.replaceChild(newOk, okBtn);
  cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);

  const freshOk     = document.getElementById('confirmModalOk');
  const freshCancel = document.getElementById('confirmModalCancel');

  freshOk.textContent = confirmLabel;
  freshOk.className   = `btn ${danger ? 'btn-danger' : 'btn-primary'}`;

  freshOk.addEventListener('click', () => {
    closeModal('modalConfirm');
    onConfirm();
  }, { once: true });

  freshCancel.addEventListener('click', () => {
    closeModal('modalConfirm');
  }, { once: true });

  openModal('modalConfirm');
}

    document.getElementById('productPrice').value = p.price;
    document.getElementById('productQty').value = p.quantity;
    document.getElementById('productMinStock').value = p.minStock;
    document.getElementById('productModalTitle').textContent = 'Editar Produto';
    openModal('modalProduct');
  };

  // Bug fix: replaced window.confirm() (falha silenciosamente em mobile)
  // com showConfirm() customizado que funciona em qualquer contexto.
  window._delProduct = id => {
    const product = StorageService.getProductById(id);
    if (!product) {
      NotificationService.error('Produto não encontrado. Atualize a página.');
      return;
    }
    showConfirm(
      `Remover "${esc(product.name)}"?\n\nEsta ação não pode ser desfeita. O produto será removido do estoque e dos relatórios.`,
      () => {
        ProductsModule.remove(id);
        products = ProductsModule.getAll();
        render();
        buildSidebar();
      },
      { title: 'Remover Produto', confirmLabel: 'Remover', danger: true }
    );
  };

  window._exportProducts = () => ExportService.exportProducts(ProductsModule.getAll());

  // Bug fix: adicionado _sub para PRODUCT_DELETED — a view agora reage
  // ao evento de deleção além de PRODUCT_CREATED e PRODUCT_UPDATED.
  _sub(EVENTS.PRODUCT_CREATED, () => { products = ProductsModule.getAll(); render(); buildSidebar(); });
  _sub(EVENTS.PRODUCT_UPDATED, () => { products = ProductsModule.getAll(); render(); buildSidebar(); });
  _sub(EVENTS.PRODUCT_DELETED, () => { products = ProductsModule.getAll(); render(); buildSidebar(); });
}

    <div class="grid-4 section fade-up">
      <div class="metric-card">
        <div class="metric-label">Total de Clientes</div>
        <div class="metric-value">${customers.length}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Clientes Ativos</div>
        <div class="metric-value text-green">${customers.filter(c => c.status === 'ativo').length}</div>
        <div class="metric-delta">compra em 30 dias</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Ticket Médio Geral</div>
        <div class="metric-value text-accent">${fmt(customers.reduce((a,c) => a + (c.avgTicket||0), 0) / Math.max(1, customers.filter(c => c.purchases > 0).length))}</div>

        <div class="metric-value text-yellow">${customers.filter(c => c.status === 'inativo' || c.status === 'perdido').length}</div>

// ── Sales ─────────────────────────────────────────────────
function renderSales() {
  const sales = SalesModule.getAll().slice().reverse();

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h2>Vendas</h2>
        <p>${sales.length} venda${sales.length !== 1 ? 's' : ''} registrada${sales.length !== 1 ? 's' : ''}</p>

      <div class="page-actions">
        <button class="btn btn-secondary btn-sm" onclick="window._exportSales()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v8M4 6l3 3 3-3M2 11h10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Exportar CSV
        </button>
        <button class="btn btn-primary" id="addSaleBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Nova venda
        </button>
      </div>
    </div>

    <div class="card" style="padding:0;">
      <div class="table-wrap" style="border:none;">
        <table>
          <thead><tr><th>Data</th><th>Produto</th><th>Qtd.</th><th>Cliente</th><th>Pagamento</th><th>Total</th></tr></thead>
          <tbody>
            ${sales.length === 0
              ? `<tr><td colspan="6"><div class="empty-state">
                  <div class="empty-state-icon"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M2 2h3l2 9h9l2-7H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                  <h3>Nenhuma venda</h3>
                  <p>Registre sua primeira venda.</p>
                  <button class="btn btn-primary" id="emptySaleBtn">Registrar venda</button>
                </div></td></tr>`
              : sales.map(s => {
                  const pmtColors = {dinheiro:'gray', pix:'green', cartao:'blue', fiado:'yellow'};
                  const pmtLabels = {dinheiro:'Dinheiro', pix:'Pix', cartao:'Cartão', fiado:'Fiado'};
                  return `<tr>
                    <td class="td-muted text-xs">${fmtDate(s.createdAt)}</td>
                    <td><strong>${esc(s.productName)}</strong></td>
                    <td>${s.quantity}</td>
                    <td class="td-muted">${esc(s.customerName)}</td>
                    <td><span class="badge badge-${pmtColors[s.payment]||'gray'}">${pmtLabels[s.payment]||s.payment}</span></td>
                    <td><strong class="text-green">${fmt(s.total)}</strong></td>
                  </tr>`;
                }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;

  const setupSaleModal = () => {
    // Bug #6 & #7: Reset all modal fields and info panels before opening
    document.getElementById('saleQty').value = '';
    document.getElementById('saleProductInfo').style.display = 'none';
    document.getElementById('saleTotalBox').style.display = 'none';
    document.getElementById('saleTotalDisplay').textContent = 'R$ 0,00';
    document.getElementById('salePayment').value = 'dinheiro';

    // Populate products dropdown (fresh, includes current stock)
    const sel = document.getElementById('saleProduct');
    sel.innerHTML = '<option value="">Selecione um produto…</option>';
    ProductsModule.getAll().forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = `${esc(p.name)} (${p.quantity} un.)`;
      opt.dataset.price = p.price;
      opt.dataset.stock = p.quantity;
      sel.appendChild(opt);
    });
    sel.value = ''; // ensure blank is selected after repopulation

    // Populate customers dropdown
    const csel = document.getElementById('saleCustomer');
    csel.innerHTML = '<option value="">Balcão (sem vínculo)</option>';
    CustomersModule.getAll().forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.dataset.name = c.name;
      opt.textContent = c.name;
      csel.appendChild(opt);
    });

    // Bug #4 & accumulation: Use cloneNode trick to remove old listeners before attaching new ones
    const newSel = sel.cloneNode(true);
    sel.parentNode.replaceChild(newSel, sel);
    const newQty = document.getElementById('saleQty').cloneNode(true);
    document.getElementById('saleQty').parentNode.replaceChild(newQty, document.getElementById('saleQty'));

    const updateTotal = () => {
      const s = document.getElementById('saleProduct');
      const opt = s.options[s.selectedIndex];
      const qty = parseInt(document.getElementById('saleQty').value, 10) || 0;
      if (opt?.value && qty > 0) {
        const price = parseFloat(opt.dataset.price);
        document.getElementById('saleTotalBox').style.display = 'block';
        document.getElementById('saleTotalDisplay').textContent = fmt(price * qty);
      } else {
        document.getElementById('saleTotalBox').style.display = 'none';
      }
    };

    document.getElementById('saleProduct').addEventListener('change', () => {
      const s = document.getElementById('saleProduct');
      const opt = s.options[s.selectedIndex];
      if (opt?.value) {
        document.getElementById('saleProductInfo').style.display = 'block';
        document.getElementById('salePriceDisplay').textContent = fmt(parseFloat(opt.dataset.price));
        document.getElementById('saleStockDisplay').textContent = `${opt.dataset.stock} un.`;
      } else {
        document.getElementById('saleProductInfo').style.display = 'none';
      }
      updateTotal();
    });
    document.getElementById('saleQty').addEventListener('input', updateTotal);

    openModal('modalSale');
  };

  document.getElementById('addSaleBtn').addEventListener('click', setupSaleModal);
  // Bug #4: emptySaleBtn only exists when there are no sales — use live lookup inside handler
  const emptyBtn = document.getElementById('emptySaleBtn');
  if (emptyBtn) emptyBtn.addEventListener('click', setupSaleModal);

  window._exportSales = () => ExportService.exportSales(SalesModule.getAll());
}

['purchaseQty','purchaseUnitCost'].forEach(fid => {
  document.getElementById(fid)?.addEventListener('input', () => {
    const qty  = parseFloat(document.getElementById('purchaseQty').value) || 0;
    const cost = parseFloat(document.getElementById('purchaseUnitCost').value) || 0;
    const total = qty * cost;
    const box  = document.getElementById('purchaseTotalBox');
    const disp = document.getElementById('purchaseTotalCost');
    box.style.display = (qty > 0 && cost > 0) ? 'block' : 'none';

  });

document.getElementById('savePurchaseBtn').addEventListener('click', () => {
  const productSel  = document.getElementById('purchaseProduct');
  const supplierSel = document.getElementById('purchaseSupplier');
  const productId   = productSel.value;
  const qty         = parseInt(document.getElementById('purchaseQty').value, 10);
  const unitCost    = parseFloat(document.getElementById('purchaseUnitCost').value);

  if (!productId) { NotificationService.error('Selecione um produto.'); return; }
  if (!qty || qty <= 0) { NotificationService.error('Quantidade inválida.'); return; }
  if (!unitCost || unitCost <= 0) { NotificationService.error('Custo unitário inválido.'); return; }

  const supplierOpt = supplierSel.options[supplierSel.selectedIndex];
  const result = PurchasesModule.createPurchase({
    productId,
    productName:  productSel.options[productSel.selectedIndex]?.dataset.name || '',
    supplierId:   supplierSel.value || null,
    supplierName: supplierOpt?.dataset.name || 'Fornecedor Avulso',
    quantity:     qty,
    unitCost,
    totalCost:    qty * unitCost,
    notes:        document.getElementById('purchaseNotes').value,
  });

  if (result) {
    closeModal('modalPurchase');
    if (activeModule === 'purchases') renderPurchases();
    if (activeModule === 'dashboard')  renderDashboard();
    buildSidebar();
  }
});

// ── Helpers ───────────────────────────────────────────────
function fmt(n) {
  return 'R$ ' + Number(n || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(ts) {
  return new Date(ts).toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}

function timeAgo(ts) {
  const d = Date.now() - ts;
  if (d < 60000)  return 'agora mesmo';
  if (d < 3600000) return `${Math.floor(d/60000)}min atrás`;
  if (d < 86400000) return `${Math.floor(d/3600000)}h atrás`;
  return `${Math.floor(d/86400000)}d atrás`;
}

function emptyState(msg) {
  return `<div style="text-align:center;padding:24px;color:var(--text-2);font-size:0.8125rem;">${msg}</div>`;
}

    <div id="insightCards" class="section">
      ${insights.length === 0
        ? `<div class="empty-state"><div class="empty-state-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 2a7 7 0 017 7c0 3-1.7 5.5-4.2 6.8V18H9.2v-2.2C6.7 14.5 5 12 5 9a7 7 0 017-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M9 21h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><h3>Sem insights</h3><p>Adicione mais dados (vendas, produtos) para gerar análises.</p></div>`
        : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">
            ${insights.map(ins => `
              <div class="insight-card fade-up" data-category="${esc(ins.category)}" style="background:var(--surface);border:1px solid var(--border);border-left:3px solid ${typeBorder[ins.type]};border-radius:var(--radius);padding:16px;transition:border-color 200ms">
                <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
                  <span style="flex-shrink:0;margin-top:1px">${typeIcons[ins.type]}</span>
                  <div style="flex:1">
                    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">
                      <strong style="font-size:.875rem">${esc(ins.title)}</strong>
                      <span class="badge ${catColors[ins.category]||'badge-gray'}">${esc(ins.category)}</span>
                    </div>
                    <p style="font-size:.8rem;color:var(--text-2);line-height:1.5">${esc(ins.body)}</p>
                  </div>
                </div>
                ${ins.value !== null && ins.unit ? `
                  <div style="display:flex;align-items:baseline;gap:4px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
                    <span style="font-size:1.25rem;font-weight:700;color:${typeBorder[ins.type]}">${ins.unit === 'R$' ? fmt(ins.value) : (typeof ins.value === 'number' && !Number.isInteger(ins.value)) ? ins.value.toFixed(1) : esc(ins.value)}</span>
                    ${ins.unit !== 'R$' ? `<span style="font-size:.75rem;color:var(--text-3)">${ins.unit}</span>` : ''}
                  </div>` : ''}
              </div>`).join('')}
           </div>`}
    </div>
  `;

  // Tab filter
  document.querySelectorAll('.tab-btn[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const cat = btn.dataset.cat;
      document.querySelectorAll('.insight-card[data-category]').forEach(card => {
        card.style.display = (cat === 'todos' || card.dataset.category === cat) ? '' : 'none';
      });
    });
  });
}

// ── V1.3: AI ASSISTANT ───────────────────────────────────
function renderAI() {
  const history = [];

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <div class="page-header-left">
        <h2>Assistente IA</h2>
        <p>Análises inteligentes do seu negócio • <span style="color:var(--accent);font-size:.75rem">Powered by ${AIService.getModelName()}</span></p>
      </div>
    </div>

    <div class="section fade-up" style="max-width:700px;">
      <!-- Quick prompts -->
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">
        ${[
          'Qual produto mais vendeu?',
          'Resumo financeiro',
          'Alertas de estoque',
          'Análise de clientes',
          'Fluxo de caixa',
          'Análise de vendas',
        ].map(q => `<button class="btn btn-ghost btn-sm ai-quick" onclick="window._aiAsk('${q}')">${q}</button>`).join('')}
      </div>

      <!-- Chat window -->
      <div id="aiChat" style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);min-height:280px;max-height:440px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;">
        <div style="text-align:center;color:var(--text-3);font-size:.8125rem;padding:24px 0;">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="margin-bottom:8px;display:block;margin-inline:auto"><circle cx="14" cy="14" r="12" stroke="var(--accent)" stroke-width="1.5" opacity=".5"/><path d="M9 14c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round"/><circle cx="14" cy="14" r="2" fill="var(--accent)"/></svg>
          Olá! Sou o assistente do BusinessOS.<br>Pergunte sobre estoque, vendas, clientes ou finanças.
          <div style="margin-top:8px;font-size:.75rem;opacity:.6;">
            <!-- API SLOT: AI PROVIDER | FUTURE: Claude / Gemini / OpenAI -->
            Modo atual: análise local dos dados internos
          </div>
        </div>
      </div>

      <!-- Input -->
      <div style="display:flex;gap:8px;margin-top:12px;">
        <input type="text" id="aiInput" class="input" placeholder="Pergunte sobre seu negócio…" style="flex:1;" />
        <button class="btn btn-primary" id="aiSendBtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M13 7L1 1l3 6-3 6 12-6z" fill="currentColor"/></svg>
          Enviar
        </button>
      </div>
    </div>
  `;

  const chat  = document.getElementById('aiChat');
  const input = document.getElementById('aiInput');

  function appendMsg(role, text) {
    const div = document.createElement('div');
    div.style.cssText = role === 'user'
      ? 'align-self:flex-end;background:var(--accent);color:#fff;padding:10px 14px;border-radius:14px 14px 4px 14px;max-width:85%;font-size:.8125rem;line-height:1.5;'
      : 'align-self:flex-start;background:var(--bg);border:1px solid var(--border);padding:10px 14px;border-radius:14px 14px 14px 4px;max-width:90%;font-size:.8125rem;line-height:1.6;';
    // Render **bold** markdown-style
    div.innerHTML = esc(text).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    // Clear welcome if first message
    if (chat.children.length === 1 && chat.children[0].style.textAlign === 'center') {
      chat.innerHTML = '';
    }
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function send(query) {
    if (!query.trim()) return;
    appendMsg('user', query);
    input.value = '';
    input.disabled = true;
    document.getElementById('aiSendBtn').disabled = true;

    const thinking = appendMsg('ai', '');
    const dots = document.createElement('span');
    dots.className = 'dot-anim';
    dots.innerHTML = '<span style="animation:blink 1s infinite 0s">●</span><span style="animation:blink 1s infinite .2s">●</span><span style="animation:blink 1s infinite .4s">●</span>';
    thinking.appendChild(dots);

    let raw = '';
    function _clearDots() {
      const d = thinking.querySelector('.dot-anim');
      if (d) d.remove();
    }

    try {
      const response = await AIService.analyze(query, (chunk) => {
        _clearDots();
        raw += chunk;
        thinking.textContent = raw;
        chat.scrollTop = chat.scrollHeight;
      });

      _clearDots();
      if (raw) {
        thinking.innerHTML = esc(raw).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
      }
      
      if (response.source && response.source !== 'error') {
        const badge = document.createElement('div');
        badge.style.cssText = 'font-size:.7rem;color:var(--text-3);margin-top:6px;';
        badge.textContent = `Fonte: ${response.source}`;
        thinking.appendChild(badge);
      } else if (response.source === 'error') {
        thinking.innerHTML = esc(response.text);
      }
    } catch (err) {
      thinking.textContent = 'Erro ao processar consulta. Tente novamente.';
    }

    input.disabled = false;
    document.getElementById('aiSendBtn').disabled = false;
    input.focus();
    chat.scrollTop = chat.scrollHeight;
  }

  window._aiAsk = q => { input.value = q; send(q); };

  document.getElementById('aiSendBtn').addEventListener('click', () => send(input.value));
  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(input.value); });
}

// ── Boot ─────────────────────────────────────────────────
buildSidebar();
navigateTo('dashboard');

// Global dashboard refresh — re-subscribed at boot and after each navigateTo clears
// Using a permanent handler outside _unsubs so it survives module navigation
EventBus.subscribe(EVENTS.DASHBOARD_REFRESH, () => {
  if (activeModule === 'dashboard') renderDashboard();
  buildSidebar();
});
</script>
</body>
